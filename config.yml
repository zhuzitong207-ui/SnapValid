# 基础配置
basic:
  script_save_path: "./scripts"
  screenshot_save_path: "./screenshots"
  log_path: "./logs"
  log_level: "INFO"  # DEBUG/INFO/WARNING/ERROR

# 录制配置
recorder:
  hotkey_start: "F9"
  hotkey_stop: "F11"
  record_mouse_move: true  # 是否录制鼠标移动
  record_interval: 0.01    # 录制采样间隔(秒)

# 回放配置
player:
  hotkey_play: "F10"
  play_speed: 1.0          # 回放速度倍率
  retry_times: 3           # 失败重试次数
  retry_interval: 1        # 重试间隔(秒)

# OCR配置
ocr:
  tesseract_path: "tesseract.exe"  # Tesseract路径
  lang: "chi_sim+eng"              # 识别语言
  confidence_threshold: 0.7        # 置信度阈值
  hotkey_insert: "ctrl+alt+i"      # 插入OCR步骤快捷键

# 截图校验配置
screenshot:
  hotkey_insert: "ctrl+alt+s"      # 插入截图校验步骤快捷键
  similarity_threshold: 0.95       # 相似度阈值(0-1)
  check_interval: 0.5              # 校验轮询间隔(秒)
  timeout: 10                      # 校验超时时间(秒)